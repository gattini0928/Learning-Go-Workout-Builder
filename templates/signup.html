<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Body</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css"></head>
    <link rel="stylesheet" href="/static/css/forms.css">
</head>
<body>
     <form action="" class="signup-form">
        <h3>Crie sua Conta</h3>
        <div class="labels-and-inputs">
            <label for="name">Nome:</label>
            <input type="text" name="name" id="name" class="form-input" placeholder="Nome e Sobrenome" required>
        </div>
        <div class="labels-and-inputs">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" class="form-input" placeholder="Email" required>
        </div>
        <div class="labels-and-inputs">
            <label for="text">Senha:</label>
            <input type="text" name="password" id="password" class="form-input" placeholder="Senha" required>
        </div>
        <button type="submit" class="form-btn">Criar Conta</button>
     </form>   
</body>
</html>
